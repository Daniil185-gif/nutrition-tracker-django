{% extends "base.html" %}

{% block title %}Удалить рецепт{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body">
                <h1 class="h3 mb-3">Удалить рецепт</h1>
                <p>Вы уверены, что хотите удалить рецепт <strong>{{ recipe.title }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button class="btn btn-danger" type="submit">Удалить</button>
                    <a class="btn btn-outline-secondary" href="{% url 'recipe_detail' recipe.id %}">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
