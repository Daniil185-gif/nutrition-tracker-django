{% extends "base.html" %}

{% block title %}Добавить рецепт{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h3 mb-3">Добавить рецепт</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-dark" type="submit">Сохранить</button>
                    <a class="btn btn-outline-secondary" href="{% url 'recipe_list' %}">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
