{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h3 mb-3">{{ page_title }}</h1>
                <p class="text-muted">Рецепт: {{ recipe.title }}</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-dark" type="submit">{{ submit_label }}</button>
                    <a class="btn btn-outline-secondary" href="{% url 'recipe_detail' recipe.id %}">Назад</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
