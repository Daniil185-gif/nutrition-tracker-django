services:
  - type: web
    name: nutrition-tracker
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn config.wsgi:application"
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "nutrition-tracker.onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nutrition-tracker-db
          property: connectionString

databases:
  - name: nutrition-tracker-db
    databaseName: nutrition_tracker
    user: nutrition_tracker_user
